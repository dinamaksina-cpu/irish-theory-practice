<!doctype html><html lang="uk"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0f3d34"><title>Irish Theory Practice</title><link rel="stylesheet" href="style.css"></head><body><div class="app"><header class="hero"><div><p class="eyebrow">Irish Driving Theory Test</p><h1>Practice Test</h1><p class="muted">801 питання • картинки підтягуються автоматично</p></div><div class="score"><b id="totalCount">801</b><span>питань</span></div></header><section class="panel setup" id="setup"><label>Мова<select id="lang"><option value="ua">Українська</option><option value="en">English</option><option value="ru">Русский</option></select></label><label>Режим<select id="mode"><option value="all">Всі питання по порядку</option><option value="random">Випадкові питання</option><option value="exam">Іспит 40 питань</option><option value="wrong">Повторити помилки</option><option value="fav">Обране ⭐</option></select></label><button id="startBtn">Почати</button></section><main class="panel quiz hidden" id="quiz"><div class="topbar"><button class="ghost" id="homeBtn">← Меню</button><div id="progressText"></div><button class="ghost" id="favBtn">☆</button></div><div class="progress"><span id="progressBar"></span></div><article class="card"><div class="qid" id="qid"></div><img id="qImage" class="qimage hidden" alt="Question image"><h2 id="question"></h2><div id="options" class="options"></div><div id="feedback" class="feedback hidden"></div></article><div class="actions"><button id="prevBtn" class="secondary">Назад</button><button id="nextBtn">Далі</button></div></main><section class="panel result hidden" id="result"><h2>Результат</h2><p id="resultText"></p><button id="againBtn">Повернутися в меню</button></section></div><script src="app.js"></script></body></html>
