<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#14382f" />
  <title>Irish Driving Theory Test</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section id="accessScreen" class="access hidden">
    <div class="access-card">
      <p class="eyebrow">Private access</p>
      <h1>Irish Driving Theory Test</h1>
      <p class="sub">Enter access code to continue</p>
      <input id="accessCode" placeholder="Access code" autocomplete="off" />
      <button id="accessBtn">Enter</button>
      <p id="accessError" class="error hidden">Wrong access code</p>
    </div>
  </section>

  <div id="appShell" class="shell hidden">
    <header class="hero">
      <div>
        <p class="eyebrow">Practice Test</p>
        <h1>Irish Driving Theory Test</h1>
      </div>
      <div class="pill"><b id="totalCount">801</b><span>questions</span></div>
    </header>

    <section class="panel profile-panel">
      <div>
        <label>Profile</label>
        <select id="profileSelect"></select>
      </div>
      <button id="addProfileBtn" class="ghost">+ Create profile</button>
      <div>
        <label>Language mode</label>
        <select id="lang">
          <option value="en">English only</option>
          <option value="ua">Ukrainian only</option>
          <option value="ru">Russian only</option>
          <option value="en_ua">English + Ukrainian</option>
          <option value="en_ru">English + Russian</option>
        </select>
      </div>
      <button id="themeBtn" class="ghost">🌙 Theme</button>
      <button id="resetBtn" class="ghost danger">Reset profile progress</button>
    </section>

    <section id="home" class="home-block">
      <div class="panel tools-panel">
        <div>
          <label>Search by question number</label>
          <div class="search-row">
            <input id="searchNumber" type="number" min="1" max="801" placeholder="e.g. 651" />
            <button id="searchBtn">Open</button>
          </div>
        </div>
        <div>
          <label>Practice by topic</label>
          <div class="search-row">
            <select id="topicSelect">
              <option value="all">All topics</option>
              <option value="signs">Road signs</option>
              <option value="rules">Rules of the road</option>
              <option value="speed">Speed limits</option>
              <option value="parking">Parking</option>
              <option value="motorway">Motorways</option>
              <option value="vehicle">Vehicle safety</option>
              <option value="law">Law, documents & penalties</option>
              <option value="hazards">Hazards & emergencies</option>
            </select>
            <button id="topicBtn">Start</button>
          </div>
        </div>
      </div>

      <section class="grid">
        <button class="mode-card" data-mode="random10"><span>🔟</span><b>10 Random Questions</b><small>Quick practice</small></button>
        <button class="mode-card" data-mode="random20"><span>🎲</span><b>20 Random Questions</b><small>More practice</small></button>
        <button class="mode-card exam" data-mode="exam40"><span>📝</span><b>40 Official Exam</b><small>45 min • pass 35/40</small></button>
        <button class="mode-card" data-mode="all"><span>📚</span><b>All Questions</b><small>Study all questions</small></button>
        <button class="mode-card" data-mode="wrong"><span>❌</span><b>Only Mistakes</b><small>Your wrong answers</small></button>
        <button class="mode-card" data-mode="fav"><span>⭐</span><b>Only Favorites</b><small>Saved questions</small></button>
        <button class="mode-card" data-mode="stats"><span>📊</span><b>Statistics</b><small>Your progress</small></button>
      </section>
    </section>

    <main id="quiz" class="quiz hidden">
      <div class="quiz-top">
        <button id="backBtn" class="ghost">← Menu</button>
        <div class="counter"><span id="timer" class="timer hidden">45:00</span><span id="counter">1 / 40</span></div>
        <button id="favBtn" class="star">☆</button>
      </div>
      <div class="bar"><span id="bar"></span></div>
      <article class="question-card">
        <div class="meta"><span id="qid">№</span><span id="modeLabel"></span></div>
        <img id="qImg" class="qimg hidden" alt="Question image" />
        <div id="noImage" class="no-image hidden">No image available</div>
        <h2 id="question"></h2>
        <div id="answers" class="answers"></div>
        <div id="feedback" class="feedback hidden"></div>
      </article>
      <div class="nav">
        <button id="prevBtn" class="secondary">Back</button>
        <button id="nextBtn">Next</button>
      </div>
    </main>

    <section id="result" class="panel result hidden">
      <h2 id="resultTitle">Result</h2>
      <p id="resultText"></p>
      <div id="resultList" class="result-list"></div>
      <button id="homeBtn">Back to menu</button>
    </section>

    <section id="stats" class="panel result hidden">
      <h2>Statistics</h2>
      <p id="statsText"></p>
      <div id="statsList" class="result-list"></div>
      <button id="statsHomeBtn">Back to menu</button>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
