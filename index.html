<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#14382f" />
  <title>Irish Theory Practice 2.0</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Irish Driving Theory Test</p>
        <h1>Practice 2.0</h1>
        <p class="sub">801 питання • 3 мови • картинки • прогрес</p>
      </div>
      <div class="pill"><b id="totalCount">801</b><span>questions</span></div>
    </header>

    <section id="home" class="grid">
      <button class="mode-card" data-mode="learn"><span>📚</span><b>Learning</b><small>Всі питання по порядку</small></button>
      <button class="mode-card" data-mode="random"><span>🎲</span><b>Random</b><small>Випадкові питання</small></button>
      <button class="mode-card" data-mode="exam"><span>📝</span><b>Mock Test</b><small>40 питань як іспит</small></button>
      <button class="mode-card" data-mode="wrong"><span>❌</span><b>Wrong</b><small>Повторити помилки</small></button>
      <button class="mode-card" data-mode="fav"><span>⭐</span><b>Favorites</b><small>Обрані питання</small></button>
      <button class="mode-card" data-mode="stats"><span>📊</span><b>Statistics</b><small>Твій прогрес</small></button>
    </section>

    <section class="panel controls">
      <label>Мова
        <select id="lang">
          <option value="ua">Українська</option>
          <option value="en">English</option>
          <option value="ru">Русский</option>
        </select>
      </label>
      <button id="themeBtn" class="ghost">🌙 Dark</button>
      <button id="resetBtn" class="ghost danger">Скинути прогрес</button>
    </section>

    <main id="quiz" class="quiz hidden">
      <div class="quiz-top">
        <button id="backBtn" class="ghost">← Menu</button>
        <div class="counter" id="counter">1 / 40</div>
        <button id="favBtn" class="star">☆</button>
      </div>
      <div class="bar"><span id="bar"></span></div>
      <article class="question-card">
        <div class="meta"><span id="qid">№</span><span id="modeLabel"></span></div>
        <img id="qImg" class="qimg hidden" alt="Question image" />
        <h2 id="question"></h2>
        <div id="answers" class="answers"></div>
        <div id="feedback" class="feedback hidden"></div>
      </article>
      <div class="nav">
        <button id="prevBtn" class="secondary">Назад</button>
        <button id="nextBtn">Далі</button>
      </div>
    </main>

    <section id="result" class="panel result hidden">
      <h2>Результат</h2>
      <p id="resultText"></p>
      <div id="resultList" class="result-list"></div>
      <button id="homeBtn">Повернутися в меню</button>
    </section>

    <section id="stats" class="panel result hidden">
      <h2>Статистика</h2>
      <p id="statsText"></p>
      <button id="statsHomeBtn">Повернутися в меню</button>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
