<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f7f6" />
  <title>Driving Theory — UX Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <button class="icon-btn" id="exitBtn" aria-label="Вийти">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6"/><path d="M9 12h11"/></svg>
      </button>

      <div class="title-wrap">
        <div class="eyebrow">Практика</div>
        <div class="title" id="questionCounter">Питання 1 із 20</div>
      </div>

      <div class="top-actions">
        <button class="icon-btn" id="saveBtn" aria-label="Зберегти">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1z"/></svg>
        </button>
        <button class="icon-btn" id="settingsBtn" aria-label="Налаштування">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06-2.83 2.83-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.1V21H9.6v-.09A1.7 1.7 0 0 0 9 19.4a1.7 1.7 0 0 0-1.88.34l-.06.06-2.83-2.83.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.1-.4H3V9.6h.09A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.34-1.88l-.06-.06 2.83-2.83.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .4-1.1V3h4v.09A1.7 1.7 0 0 0 15 4.6a1.7 1.7 0 0 0 1.88-.34l.06-.06 2.83 2.83-.06.06A1.7 1.7 0 0 0 19.4 9c.15.38.36.72.6 1 .29.28.68.43 1.1.4H21v4h-.09a1.7 1.7 0 0 0-1.1.4c-.28.24-.49.58-.6 1z"/></svg>
        </button>
      </div>
    </header>

    <section class="progress-section" aria-label="Прогрес">
      <div class="progress-meta"><span id="progressText">1 / 20</span><span id="progressPercent">5%</span></div>
      <div class="segmented-progress" id="segmentedProgress"></div>
    </section>

    <main class="question-card">
      <div class="topic-pill" id="topic">Дорожня ситуація</div>
      <h1 id="questionText">Що повинен зробити водій, наближаючись до пішохідного переходу?</h1>

      <button class="image-frame" id="imageFrame" type="button" aria-label="Збільшити зображення">
        <div class="image-placeholder">
          <svg viewBox="0 0 640 360" role="img" aria-label="Місце для зображення питання">
            <rect width="640" height="360" rx="28" fill="#eef3f1"/>
            <path d="M0 268 170 150l105 84 88-66 277 164v28H0z" fill="#dce8e3"/>
            <circle cx="475" cy="105" r="48" fill="#d1eee1"/>
            <path d="M250 280h140l-35-78h-70z" fill="#b7d9ca"/>
            <path d="M90 300h460" stroke="#fff" stroke-width="18" stroke-linecap="round" stroke-dasharray="55 30"/>
          </svg>
          <span>Тут буде ваше фото з JSON</span>
        </div>
        <div class="zoom-chip">Збільшити</div>
      </button>

      <div class="answers" id="answers"></div>
    </main>

    <footer class="bottom-actions">
      <button class="btn secondary" id="prevBtn">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
        Назад
      </button>
      <button class="btn primary" id="nextBtn">
        Далі
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
      </button>
    </footer>
  </div>

  <div class="modal-backdrop" id="imageModal" hidden>
    <div class="image-modal-card">
      <button class="modal-close" id="closeImage" aria-label="Закрити">×</button>
      <div class="modal-image-placeholder">Зображення питання</div>
    </div>
  </div>

  <div class="sheet-backdrop" id="settingsSheet" hidden>
    <section class="sheet" role="dialog" aria-modal="true" aria-label="Налаштування">
      <div class="sheet-handle"></div>
      <div class="sheet-head"><h2>Налаштування</h2><button id="closeSettings">Готово</button></div>
      <label class="setting-row"><span>Показувати пояснення</span><input type="checkbox" checked></label>
      <label class="setting-row"><span>Вібрація</span><input type="checkbox" checked></label>
      <label class="setting-row"><span>Звуки</span><input type="checkbox"></label>
      <label class="setting-row"><span>Великий текст</span><input type="checkbox"></label>
    </section>
  </div>

  <div class="toast" id="toast">Питання збережено</div>
  <script src="app.js"></script>
</body>
</html>
